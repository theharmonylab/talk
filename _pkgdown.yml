
url: https://r-talk.org

template:
  package: tidytemplate
  bootstrap: 5
  includes:
    in_header: |
      <script defer data-domain="r-talk.org" src="https://plausible.io/js/plausible.js"></script>
    after_body: |
      <div style="text-align: center; margin-top: 1px;">
        <p>
          <a href="https://harmonyresearchgroup.com" target="_blank">
            <img src="man/figures/harmony_logo_all.png" alt="GitHub" style="height:25px; vertical-align:middle;">
          </a>
        </p>
      </div>

development:
  mode: default

navbar:
  structure:
    left:  [installation, tutorial, reference, news]
    right: [search, github, lightswitch]

  components:
    installation:
      text: Installation
      href: installation.html
    tutorial:
      text: Getting started
      href: articles/talk.html
    reference:
      text: Reference API
      href: reference/index.html
    news:
      text: News
      href: news/index.html

home:
  title: talk
  description: Analyses of talk in audio recordings using transformers models such as Whisper from HuggingFace.
  sidebar:
    structure: [workshop, links, license, community, citation, authors, dev]
    components:
      workshop:
        title: Workshop
        text: "📣 [**Aug 11–13, 2026:** Analysing Human Language using R](https://smart-workshops.com/lang-r-info)"
  links:
    - text: Ask a question about talk using the r-talk tag
      href: https://stackoverflow.com/

authors:
  Oscar Kjell:
    href: https://oscarkjell.se/
  Dhairya Umrania:
    href: https://github.com/DhairyaUmrania
  Rajath Rao:
    href: https://github.com/Jarhatz


reference:
  - title: Installation
    contents:
      - talkrpp_install
      - talkrpp_install_virtualenv
      - talkrpp_uninstall
      - talkrpp_initialize
      - find_talkrpp_env
      - list_talkrpp_envs
  - title: Transform talk to word embeddings
    contents:
      - talkText
      - talkEmbed
      - talkTranscribeDiarise
      - talkEmbedSegments

news:
  one_page: true
  cran_dates: true

