on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

name: OS-installation-steps-and-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-24.04, r: 'release'}
#        - {os: macOS-latest, r: '4.3.0', python: '3.9'}
#          - {os: macOS-latest, r: 'release', python: '3.11'}

    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      # Set up R environment
      - uses: r-lib/actions/setup-r@v2-branch
        with:
          r-version: ${{ matrix.config.r }}

      - uses: r-lib/actions/setup-pandoc@v2-branch

      # ffmpeg binary — required by the diarisation pipeline. Installed via the
      # system package manager (NOT conda, which drags in a newer libav* stack
      # that torchaudio cannot use -> "Failed to load audio").
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg

      - name: Query R Dependencies
        run: |
          install.packages('remotes')
          saveRDS(remotes::dev_package_deps(dependencies = TRUE), ".github/depends.Rds", version = 2)
          writeLines(sprintf("R-%i.%i", getRversion()$major, getRversion()$minor), ".github/R-version")
        shell: Rscript {0}

      # Cache R packages
      - name: Cache R Packages
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-${{ hashFiles('.github/depends.Rds') }}
          restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-

      # stringi for ubuntu
      - name: Reinstall stringi from source on Ubuntu 24.04
        if: matrix.config.os == 'ubuntu-24.04'
        run: |
          install.packages("stringi", type = "source")
        shell: Rscript {0}


      - name: Install system libraries for ragg/systemfonts/textshaping
        if: matrix.config.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libfreetype6-dev \
            libpng-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfontconfig1-dev \
            libcairo2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libtiff5-dev \
            libjpeg-dev \
            libicu-dev \
            default-jdk
            sudo R CMD javareconf

      # Install R dependencies
      - name: Install R Dependencies
        run: |
          remotes::install_deps(dependencies = TRUE)
          remotes::install_cran("rcmdcheck")
          install.packages("devtools")
        shell: Rscript {0}

      # TEST 1:
      - name: install talk
        run: |
          devtools::install_github("theharmonylab/talk")
          library(talk)
        shell: Rscript {0}

      # Test 2: test talkrpp_install() for stopping and informating which dependenies he user needs
      - name: talkrpp_install -- Graceful Fail
        if: runner.os != 'Windows'
        run: |
          talk::talkrpp_install(prompt = FALSE)
        shell: Rscript {0}


      # Test 3. textrpp_install() to actually install when dependencies are satisfied.
      - name: talkrpp_install -- install the talk
        run: |
          talk::talkrpp_install(prompt = FALSE)
        shell: Rscript {0}


      # Test 4. textrpp_initialize() and testing to make embeddings
      - name: talkrpp_initialize -- test embeddings
        run: |
          library(talk)
          talk::talkrpp_initialize(talkEmbed_test = TRUE)
        shell: Rscript {0}

      # TEMPORARY Windows diagnostic: the Windows runner fails the diarise model
      # download with "[ASN1: NOT_ENOUGH_DATA]". diarize_audio() swallows the
      # traceback, so call run_diarize() directly (it propagates) and probe which
      # host/mechanism fails. continue-on-error so the job still reports.
      # Remove once the Windows download is diagnosed and fixed.
      - name: Windows diarise diagnostic (traceback + SSL probe)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: |
          library(talk)
          reticulate::use_condaenv("talkrpp_condaenv", required = TRUE)
          reticulate::py_run_string(paste(
            "import ssl, urllib.request",
            "print('OPENSSL', ssl.OPENSSL_VERSION)",
            "try:",
            "    import certifi; print('CERTIFI', certifi.where())",
            "except Exception as e:",
            "    print('CERTIFI ERR', repr(e))",
            "for u in ['https://huggingface.co','https://raw.githubusercontent.com','https://api.ngc.nvidia.com','https://catalog.ngc.nvidia.com']:",
            "    try:",
            "        urllib.request.urlopen(u, timeout=30); print('urllib OK', u)",
            "    except Exception as e:",
            "        print('urllib ERR', u, repr(e))",
            "    try:",
            "        import requests; requests.get(u, timeout=30); print('requests OK', u)",
            "    except Exception as e:",
            "        print('requests ERR', u, repr(e))",
            sep = "\n"))
          wav <- system.file("extdata", "test_diarise.wav", package = "talk")
          rd <- reticulate::import("whisnemo.core.diarize")
          rd$run_diarize(audio_path = wav, stemming = FALSE, device = "cpu",
                         model_name = "tiny.en", num_speakers = 2L,
                         oracle_num_speakers = FALSE, output_formats = list("csv"))
        shell: Rscript {0}

      # Test 5. Smoke-test talkTranscribeDiarise() + talkEmbedSegments() in the
      # single environment installed above (talkrpp_condaenv). Structural checks
      # only (status/shape); exact transcript and embedding values differ across
      # OS/arch, so they are not asserted here. Uses small whisper models to keep
      # the download light.
      - name: talkTranscribeDiarise and talkEmbedSegments -- diarisation smoke test
        if: runner.os != 'Windows'
        run: |
          library(talk)
          wav <- system.file("extdata", "test_diarise.wav", package = "talk")
          diar <- talk::talkTranscribeDiarise(audio = wav, model_name = "tiny.en")
          cat("diarise status:", diar$status, "\n")
          if (!identical(diar$status, "success")) {
            cat("diarise error:", if (!is.null(diar$error)) diar$error else "(no error field)", "\n")
          }
          stopifnot(identical(diar$status, "success"),
                    is.data.frame(diar$transcript),
                    nrow(diar$transcript) > 0)
          emb <- talk::talkEmbedSegments(audio = wav,
                                         transcript = diar$transcript,
                                         model = "whisper",
                                         embeddings = "encoder",
                                         participant_only = FALSE,
                                         whisper_model_id = "openai/whisper-tiny")
          stopifnot(is.data.frame(emb), nrow(emb) == nrow(diar$transcript))
          cat("talkEmbedSegments rows:", nrow(emb), "cols:", ncol(emb), "\n")
        shell: Rscript {0}


      # Session Info
      - name: Session Info
        run: |
          options(width = 100)
          pkgs <- installed.packages()[, "Package"]
          sessioninfo::session_info(pkgs, include_base = TRUE)
        shell: Rscript {0}
